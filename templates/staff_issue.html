<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Issue - Aviation ERP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2c3e50',
                        secondary: '#3498db',
                        accent: '#e74c3c',
                        dark: '#1a252f',
                    }
                }
            }
        }
    </script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.3s ease forwards;
        }
        @keyframes pulse-success {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .animate-pulse-success {
            animation: pulse-success 0.5s ease;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.5s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen flex flex-col">
    
    <!-- Audio element for beep sound -->
    <audio id="beepSound" preload="auto">
        <source src="data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YU" type="audio/wav">
    </audio>
    
    <!-- Top Bar with Logout and Issue Button -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="flex items-center justify-between px-6 py-3">
            <div class="flex items-center gap-3">
                <i class="bi bi-airplane-engines text-2xl text-secondary"></i>
                <h1 class="text-xl font-semibold text-primary">AISL Aviation - Staff Portal</h1>
            </div>
            <div class="flex items-center gap-3">
                <span id="currentStaff" class="text-sm text-gray-500 mr-2"></span>
                <a href="/" onclick="return confirm('Are you sure you want to logout?')" class="px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-lg font-medium transition-colors flex items-center gap-2">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-2xl">
            <!-- Staff Name Input -->
            <div class="bg-white rounded-xl shadow-lg p-6 mb-6 animate-fade-in">
                <label class="block text-sm font-medium text-gray-700 mb-2">Staff Name *</label>
                <input type="text" 
                       id="staffName"
                       required
                       class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-transparent text-lg"
                       placeholder="Enter your name"
                       autocomplete="off">
            </div>

            <!-- Barcode Scanner Section - SCAN AND GO -->
            <div class="bg-white rounded-xl shadow-lg p-8 animate-fade-in">
                <label class="block text-xl font-semibold text-gray-700 mb-4 text-center">
                    <i class="bi bi-upc-scan mr-2"></i>SCAN BARCODE (Scan & Go)
                </label>
                
                <input type="text" 
                       id="barcodeId"
                       class="w-full px-6 py-4 text-xl border-3 border-gray-300 rounded-xl focus:ring-4 focus:ring-blue-100 focus:border-secondary text-center font-mono"
                       placeholder="Ready to scan..."
                       autofocus
                       autocomplete="off">
                
                <p class="text-sm text-gray-500 mt-3 text-center">
                    Scan barcode - auto-submits when Staff Name is entered
                </p>
            </div>

            <!-- Last Scanned Item Status -->
            <div id="lastItemStatus" class="mt-4 p-4 rounded-xl hidden">
                <!-- Will be populated dynamically -->
            </div>
        </div>
    </main>

    <!-- SUCCESS Message Overlay -->
    <div id="successMessage" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-12 text-center animate-pulse-success shadow-2xl">
            <div class="w-24 h-24 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="bi bi-check-circle-fill text-5xl text-green-600"></i>
            </div>
            <h2 class="text-4xl font-bold text-green-600 mb-4">SUCCESS!</h2>
            <p id="successDetails" class="text-xl text-gray-700"></p>
        </div>
    </div>

    <!-- ERROR Message Overlay - BRIGHT RED for Part Not Found -->
    <div id="errorMessage" class="hidden fixed inset-0 bg-red-900/80 flex items-center justify-center z-50">
        <div class="bg-red-600 rounded-2xl p-12 text-center shadow-2xl border-4 border-red-400">
            <div class="w-24 h-24 bg-white rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="bi bi-x-circle-fill text-5xl text-red-600"></i>
            </div>
            <h2 class="text-4xl font-bold text-white mb-4">PART NOT FOUND</h2>
            <p id="errorDetails" class="text-xl text-yellow-200 font-bold">SCAN AGAIN</p>
            <button onclick="closeError()" class="mt-6 px-6 py-3 bg-white text-red-600 hover:bg-gray-100 rounded-lg font-bold">
                TRY AGAIN
            </button>
        </div>
    </div>

    <!-- Low Stock Warning (shown after successful issue if low stock) -->
    <div id="lowStockWarning" class="hidden fixed bottom-4 right-4 bg-yellow-100 border-2 border-yellow-400 text-yellow-800 px-6 py-4 rounded-xl shadow-lg z-50">
        <div class="flex items-center gap-3">
            <i class="bi bi-exclamation-triangle-fill text-2xl"></i>
            <div>
                <p class="font-semibold">Low Stock Alert!</p>
                <p id="lowStockDetails" class="text-sm"></p>
            </div>
        </div>
    </div>

    <script>
        let currentProduct = null;
        let currentStock = 0;
        let isProcessing = false;
        
        document.addEventListener('DOMContentLoaded', function() {
            const barcodeInput = document.getElementById('barcodeId');
            const staffNameInput = document.getElementById('staffName');
            
            // Auto-focus on barcode input on page load
            setTimeout(function() {
                barcodeInput.focus();
            }, 100);
            
            // Keep barcode input focused - if user clicks anywhere else, jump back
            document.addEventListener('click', function(e) {
                // Don't refocus if clicking on buttons, inputs, or modals
                const target = e.target;
                const isButton = target.tagName === 'BUTTON' || target.tagName === 'A';
                const isInput = target.tagName === 'INPUT' || target.tagName === 'SELECT' || target.tagName === 'TEXTAREA';
                const isInModal = target.closest('#successMessage, #errorMessage, #lowStockWarning');
                
                if (!isButton && !isInput && !isInModal) {
                    barcodeInput.focus();
                }
            });
            
            // Handle barcode scan (Enter key) - AUTO SUBMIT
            barcodeInput.addEventListener('keypress', async function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const barcode = this.value.trim();
                    
                    if (barcode && !isProcessing) {
                        await lookupAndAutoSubmit(barcode);
                    }
                }
            });
            
            // Also handle input change for scanners that don't send Enter
            barcodeInput.addEventListener('input', async function() {
                // Some scanners auto-submit, wait a moment to see if Enter was pressed
                // This is a backup for scanners that don't send Enter key
            });
            
            // Staff name - save to localStorage for convenience
            const savedStaffName = localStorage.getItem('staffName');
            if (savedStaffName) {
                staffNameInput.value = savedStaffName;
                document.getElementById('currentStaff').textContent = '👤 ' + savedStaffName;
            }
            
            staffNameInput.addEventListener('change', function() {
                localStorage.setItem('staffName', this.value);
                document.getElementById('currentStaff').textContent = '👤 ' + this.value;
            });
            
            // Also update display when staff name changes
            staffNameInput.addEventListener('input', function() {
                if (this.value.trim()) {
                    document.getElementById('currentStaff').textContent = '👤 ' + this.value.trim();
                } else {
                    document.getElementById('currentStaff').textContent = '';
                }
            });
        });
        
        // Play beep sound for error
        function playBeep() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.frequency.value = 800; // Hz
                oscillator.type = 'square';
                gainNode.gain.value = 0.3;
                
                oscillator.start();
                
                // Beep pattern: 3 short beeps
                setTimeout(() => { oscillator.stop(); }, 150);
            } catch (e) {
                console.log('Audio beep failed:', e);
            }
        }
        
        // Lookup product and auto-submit if staff name exists
        async function lookupAndAutoSubmit(barcode) {
            const staffName = document.getElementById('staffName').value.trim();
            
            if (!staffName) {
                // No staff name - show error with shake animation
                showError('Please enter Staff Name first');
                document.getElementById('staffName').focus();
                return;
            }
            
            isProcessing = true;
            
            try {
                const response = await fetch(`/api/product/search?q=${encodeURIComponent(barcode)}`);
                const data = await response.json();
                
                if (data.success && data.product) {
                    // Product found - auto-submit the issue
                    currentProduct = data.product;
                    currentStock = data.product.current_stock;
                    
                    // Auto-submit with default quantity of 1
                    await autoSubmitIssue(1);
                } else {
                    // Product NOT FOUND - play beep and show bright red error
                    playBeep();
                    showPartNotFoundError();
                    document.getElementById('barcodeId').value = '';
                    document.getElementById('barcodeId').focus();
                }
            } catch (error) {
                console.error('Error looking up product:', error);
                showError('Error looking up product. Please try again.');
            } finally {
                isProcessing = false;
            }
        }
        
        // Auto submit issue with quantity
        async function autoSubmitIssue(quantity) {
            const staffName = document.getElementById('staffName').value.trim();
            const partNumber = currentProduct.part_number;
            
            try {
                const response = await fetch('/api/staff/issue', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        staff_name: staffName,
                        part_number: partNumber,
                        quantity: quantity
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Show success message
                    document.getElementById('successDetails').textContent = 
                        `✓ ${partNumber} - Qty: ${quantity} | Remaining: ${data.new_stock}`;
                    document.getElementById('successMessage').classList.remove('hidden');
                    
                    // Hide success after 3 seconds
                    setTimeout(function() {
                        document.getElementById('successMessage').classList.add('hidden');
                    }, 3000);
                    
                    // Check for low stock warning
                    if (data.low_stock) {
                        document.getElementById('lowStockDetails').textContent = 
                            `${partNumber} is low on stock (${data.new_stock} remaining)`;
                        document.getElementById('lowStockWarning').classList.remove('hidden');
                        
                        setTimeout(function() {
                            document.getElementById('lowStockWarning').classList.add('hidden');
                        }, 5000);
                    }
                    
                    // SCAN AND GO: Clear ONLY barcode field, keep Staff Name for next scan
                    document.getElementById('barcodeId').value = '';
                    document.getElementById('barcodeId').focus();
                    
                    // Update last item status
                    updateLastItemStatus(partNumber, quantity, data.new_stock, data.low_stock);
                    
                } else {
                    showError(data.detail || 'Unknown error occurred');
                }
            } catch (error) {
                console.error('Error issuing stock:', error);
                showError('Error issuing stock. Please try again.');
            }
        }
        
        // Update the last item status display
        function updateLastItemStatus(partNumber, quantity, newStock, isLowStock) {
            const statusDiv = document.getElementById('lastItemStatus');
            const borderColor = isLowStock ? 'border-yellow-400 bg-yellow-50' : 'border-green-400 bg-green-50';
            const textColor = isLowStock ? 'text-yellow-800' : 'text-green-800';
            
            statusDiv.className = `mt-4 p-4 rounded-xl border-2 ${borderColor} ${textColor}`;
            statusDiv.innerHTML = `
                <div class="flex items-center justify-between">
                    <div>
                        <p class="font-bold text-lg">${partNumber}</p>
                        <p class="text-sm">Issued: ${quantity}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-xl">${newStock}</p>
                        <p class="text-sm">remaining</p>
                        ${isLowStock ? '<p class="text-xs text-red-600 font-bold">⚠ LOW STOCK</p>' : ''}
                    </div>
                </div>
            `;
            statusDiv.classList.remove('hidden');
        }
        
        function showError(message) {
            document.getElementById('errorDetails').textContent = message;
            document.getElementById('errorMessage').classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('animate-shake');
            
            setTimeout(() => {
                document.getElementById('errorMessage').classList.remove('animate-shake');
            }, 500);
        }
        
        // Show bright red PART NOT FOUND error
        function showPartNotFoundError() {
            document.getElementById('errorMessage').classList.remove('hidden');
            document.getElementById('errorMessage').classList.add('animate-shake');
            
            setTimeout(() => {
                document.getElementById('errorMessage').classList.remove('animate-shake');
            }, 500);
        }
        
        function closeError() {
            document.getElementById('errorMessage').classList.add('hidden');
            document.getElementById('barcodeId').focus();
        }
    </script>
</body>
</html>
